name: CD (Local)

on:
  workflow_run:
    workflows:
      - CI (model-api)
    types:
      - completed
    branches: # main 브랜치 push 가 트리거
      - main

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: kubectl apply
        run: kubectl apply -k k8s/model-api/overlays/local/

      - name: 배포 확인
        run: kubectl rollout status deployment/model-api
