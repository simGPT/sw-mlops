name: CI (model-api)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/model-api/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker 이미지 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: services/model-api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/model-api:latest
            ${{ secrets.DOCKER_USERNAME }}/model-api:${{ github.sha }}
